server {
    listen 80;
    server_name ai.khir.ca;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ai.khir.ca;

    # TLS — update paths to match your certificate locations
    ssl_certificate     /etc/letsencrypt/live/ai.khir.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.khir.ca/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Allow up to 100 MB uploads (images, PDFs, etc.)
    client_max_body_size 100m;

    # SSE / streaming — disable buffering so chunks reach the client immediately
    proxy_buffering          off;
    proxy_cache              off;
    proxy_read_timeout       300s;
    proxy_connect_timeout    10s;
    proxy_send_timeout       300s;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE streaming
        proxy_set_header   Connection        "";
        chunked_transfer_encoding on;
    }
}
