<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/styles.css?v={{ static_version }}" />
  </head>
  <body>
    <div class="shell">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar__header">
          <h1>{{ app_name }}</h1>
          <button id="new-chat-button" class="ghost-button" type="button">New chat</button>
        </div>
        <div id="status-pill" class="status-pill">Checking status…</div>
        <nav id="conversation-list" class="conversation-list"></nav>
      </aside>

      <main class="chat-panel">
        <section id="login-card" class="card login-card">
          <h2>Sign in</h2>
          <p>Use the VM-hosted login to access your local Ollama-backed assistant.</p>
          <form id="login-form" class="stack">
            <label>
              Username
              <input id="username" name="username" autocomplete="username" required />
            </label>
            <label>
              Password
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
              />
            </label>
            <button class="primary-button" type="submit">Sign in</button>
            <p id="login-error" class="error-text" hidden></p>
          </form>
        </section>

        <section id="chat-app" class="chat-app" hidden>
          <header class="chat-app__header">
            <div style="display:flex;align-items:center;gap:10px;min-width:0">
              <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Open sidebar">☰</button>
              <div style="min-width:0">
                <p class="eyebrow">Remote AI chat</p>
                <h2 id="conversation-title">New conversation</h2>
                <p id="conversation-meta" class="conversation-meta">Select a model to start a new chat.</p>
              </div>
            </div>
            <button id="logout-button" class="ghost-button" type="button">Log out</button>
          </header>

          <div id="message-list" class="message-list"></div>

          <form id="composer-form" class="composer">
            <div id="model-select-wrapper" class="model-select-wrapper" hidden>
              <label for="model-select" class="model-select-label">Model</label>
              <select id="model-select" class="model-select"></select>
            </div>
            <div id="attachment-chips" class="attachment-chips" hidden></div>
            <div class="composer__input-row">
              <textarea
                id="prompt-input"
                name="prompt"
                rows="3"
                placeholder="Ask something…"
                required
              ></textarea>
            </div>
            <div class="composer__footer">
              <div class="composer__actions">
                <button id="attach-button" class="attach-button" type="button" title="Attach file">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                  </svg>
                </button>
                <input id="file-input" type="file" hidden multiple
                  accept="image/*,.heic,.heif,.pdf,.txt,.md,.csv,.json,.yaml,.yml,.py,.js,.ts,.html,.css,.sh,.c,.cpp,.java" />
              </div>
              <p id="composer-error" class="error-text" hidden></p>
              <button id="send-button" class="primary-button" type="submit">Send</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script>
      window.__APP_BOOTSTRAP__ = {
        authenticated: {{ 'true' if authenticated else 'false' }},
      };
    </script>
    <script src="/static/app.js?v={{ static_version }}" defer></script>
  </body>
</html>
